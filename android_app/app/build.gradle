plugins {
    id 'com.android.application'
}

android {
    namespace 'com.roboarm.app'
    compileSdk 36

    defaultConfig {
        applicationId "com.roboarm.app"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation platform('org.jetbrains.kotlin:kotlin-bom:1.8.22')
    implementation 'androidx.appcompat:appcompat:1.7.0'
}
